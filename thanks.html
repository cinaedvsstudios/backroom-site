<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks | Backroom</title>
  <style>
    :root {
      --black: #000000;
      --cyan: #2CA8D4;
      --white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    main {
      width: min(92vw, 620px);
      border: 2px solid var(--cyan);
      border-radius: 22px;
      padding: 42px 28px;
      box-shadow: 0 0 28px rgba(44, 168, 212, 0.45);
      background: #000000;
    }

    h1 {
      margin: 0 0 18px;
      color: var(--cyan);
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    p {
      margin: 0 auto;
      max-width: 420px;
      color: var(--white);
      font-size: clamp(1rem, 3vw, 1.25rem);
      line-height: 1.5;
    }

    a {
      display: inline-block;
      margin-top: 28px;
      color: var(--cyan);
      text-decoration: none;
      border: 1px solid var(--cyan);
      border-radius: 999px;
      padding: 11px 20px;
      font-weight: 700;
    }

    a:hover,
    a:focus {
      background: var(--cyan);
      color: var(--black);
    }
  </style>
</head>
<body>
  <main>
    <h1>Thanks</h1>
    <p>Your report has been submitted.</p>
    <a href="./">Return to Backroom</a>
  </main>
</body>
</html>
