<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks | Backroom</title>
  <style>
    :root { --black:#000; --cyan:#2CA8D4; --white:#fff; --panel:#0B0F19; }
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; background:var(--black); color:var(--white); font-family:Arial, Helvetica, sans-serif; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; text-align:center; }
    main { width:min(92vw, 620px); border:2px solid var(--cyan); border-radius:22px; padding:42px 28px; box-shadow:0 0 28px rgba(44,168,212,.45); background:var(--panel); }
    h1 { margin:0 0 18px; color:var(--cyan); font-size:clamp(2.4rem, 8vw, 5rem); line-height:1; letter-spacing:.08em; text-transform:uppercase; }
    p { margin:0 auto 18px; max-width:460px; color:var(--white); font-size:clamp(1rem, 3vw, 1.25rem); line-height:1.5; }
    button, a { display:inline-block; margin-top:14px; border:1px solid var(--cyan); border-radius:999px; padding:12px 22px; font-weight:700; font-size:1rem; cursor:pointer; }
    button { background:#000; color:#fff; }
    button:hover, button:focus, a:hover, a:focus { background:var(--cyan); color:#000; }
    a { color:var(--cyan); text-decoration:none; margin-left:8px; }
    #manual-note { margin-top:18px; color:#c9d3df; font-size:.95rem; }
  </style>
</head>
<body>
  <main>
    <h1>Thanks</h1>
    <p>Your message has been submitted. You can close this tab and return to Backroom.</p>
    <button id="close-window" type="button">Close this window</button>
    <a href="./">Return to Backroom</a>
    <p id="manual-note">If this tab does not close automatically, you can close it manually.</p>
  </main>
  <script>
    document.getElementById('close-window').addEventListener('click', function () {
      window.close();
      setTimeout(function () {
        document.getElementById('manual-note').textContent = 'Your browser did not close the tab automatically. You can close this tab manually.';
      }, 350);
    });
  </script>
</body>
</html>
