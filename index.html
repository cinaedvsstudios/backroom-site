<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backroom Prototype v0.7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Barlow+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="age-gate" class="fullscreen-overlay">
        <div class="age-gate-content">
            <h1 id="ag-title" class="display-font">18+ ENTRY</h1>
            <p id="ag-text" class="body-font disclaimer-white">Loading...</p>
            <p id="ag-disclaimer" class="body-font disclaimer">Loading...</p>
            <div class="ag-controls">
                <button id="btn-enter" class="btn primary-btn display-font">I AM 18+ - ENTER</button>
                <div class="translation-placeholder body-font">🌍 Translate [Placeholder]</div>
            </div>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        
        <header id="top-bar">
            <div class="top-bar-logo-area">
                <img src="https://raw.githubusercontent.com/cinaedvsstudios/Backroom-site/refs/heads/main/backdoorlogo.png" alt="Backdoor Logo" class="brand-image">
                <img src="backdoortitle.png" alt="Backroom Title" class="brand-title-image" onerror="this.style.display='none'; document.getElementById('brand-title-text').style.display='block';">
                <h1 id="brand-title-text" class="display-font brand-text" style="display:none;">BR</h1>
            </div>
            
            <div class="top-bar-search-area">
                <input type="text" id="search-input" class="body-font" placeholder="Search name or description" autocomplete="off">
            </div>
            
            <div class="top-bar-buttons-area">
                <button id="btn-location" class="top-btn" title="Location">📍 Location</button>
                <button id="btn-favorites" class="top-btn" title="Favorites">☆ Favourites</button>
                <button id="btn-shortlist" class="top-btn" title="Shortlist">📑 Shortlist</button>
                <button id="btn-language" class="top-btn" title="Language">🌍 Language</button>
                <button id="btn-settings" class="top-btn" title="Settings">⚙️ Settings</button>
            </div>
        </header>

        <div id="workspace">
            <div id="sidebar-hit-area"></div>

            <aside id="sidebar">
                <div class="sidebar-item tooltip" title="Pins">
                    <span class="icon">📌</span><span class="sidebar-text display-font">Pins</span>
                </div>
                <div class="sidebar-item tooltip" title="Trending">
                    <span class="icon">🔥</span><span class="sidebar-text display-font">Trending</span>
                </div>
                <div class="sidebar-item tooltip" title="Events">
                    <span class="icon">📅</span><span class="sidebar-text display-font">Events</span>
                </div>
            </aside>

            <main id="main-content">
                <div class="content-wrapper">
                    <div class="filter-chips-container">
                        <div class="filter-chips" id="filter-chips">
                            <button class="chip active" data-filter="All">All</button>
                            <button class="chip" data-filter="Open Now">Open Now</button>
                            <button class="chip" data-filter="Darkroom">Darkroom</button>
                            <button class="chip" data-filter="Men Only">Men Only</button>
                        </div>
                    </div>

                    <section id="results-container"></section>
                </div>
            </main>
        </div>
    </div>

    <div id="location-modal" class="modal hidden">
        <div class="modal-content location-content">
            <button id="close-location-modal" class="btn-close">✕</button>
            <div class="modal-header">
                <h2 class="display-font">SET LOCATION</h2>
            </div>
            <div class="modal-body body-font">
                <p class="meta-text">Set your location to find nearby venues and events.</p>
                <button id="btn-gps" class="btn primary-btn">📍 Use My GPS Location</button>
                <hr class="divider">
                <input type="text" id="loc-country" class="form-input" placeholder="Country">
                <input type="text" id="loc-city" class="form-input" placeholder="City">
                <input type="text" id="loc-postcode" class="form-input" placeholder="Postcode (Optional)">
                <div class="modal-actions-row">
                    <button id="btn-save-location" class="btn primary-btn">Save</button>
                    <button id="btn-clear-location" class="btn secondary-btn">Clear</button>
                </div>
                <p id="current-location-display" class="meta-text" style="text-align:center; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <div id="venue-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal" class="btn-close">✕</button>
            <div class="modal-header">
                <h2 id="modal-title" class="display-font">VENUE NAME</h2>
                <div class="modal-actions">
                    <button id="modal-star" class="icon-btn">☆</button>
                    <button id="modal-shortlist" class="icon-btn">📑</button>
                    <button id="modal-share" class="icon-btn">🔗</button>
                </div>
            </div>
            
            <div class="modal-body body-font">
                <div class="modal-top-split">
                    <div class="modal-image-container">
                        <div class="image-placeholder">VENUE IMAGE</div>
                    </div>
                    
                    <div class="modal-info-container">
                        <div id="modal-status-bar" class="status-bar"></div>
                        <p id="modal-address" class="meta-text"></p>
                        <button id="btn-map" class="btn secondary-btn">🗺️ Directions</button>
                        
                        <div id="modal-public-stats" class="public-stats-block"></div>
                        <div class="feature-chips" id="modal-features"></div>
                        <div class="ratings-grid" id="modal-ratings"></div>
                    </div>
                </div>

                <div class="description-block">
                    <h3 class="display-font">ABOUT</h3>
                    <p id="modal-description"></p>
                </div>

                <div id="modal-events" class="events-block hidden">
                    <h3 class="display-font">UPCOMING EVENTS</h3>
                    <div id="events-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
