<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backroom - v0.31</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Barlow+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container" class="toast-container hidden"></div>

    <div id="profile-wipe-toast" class="modal hidden" style="z-index: 3000;">
        <div class="toast show" style="position:relative; transform:none; bottom:auto; left:auto; margin: auto; max-width: 450px; display:flex; flex-direction:column; gap:15px; padding: 25px;">
            <h3 class="display-font" style="font-size:1.8rem; margin:0; color:#fff;">NEW PROFILE</h3>
            <p class="body-font" style="font-size:1.1rem; margin:0; color:#fff;">
                You are creating a new profile. This will not erase your previous profile data. How would you like to start?
            </p>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                <button id="btn-wipe-all" class="btn pill-btn primary-btn">Start with a blank profile</button>
                <button id="btn-wipe-profile-only" class="btn secondary-btn pill-btn">Make a copy of your current profile</button>
                <button onclick="document.getElementById('profile-wipe-toast').classList.add('hidden')" class="btn pill-btn" style="background:transparent; border:1px solid rgba(255,255,255,0.5); color:#fff;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content small-modal">
            <button class="btn-close close-modal-btn">❌</button>
            <div class="modal-header"><h2 class="display-font">MY PROFILE</h2></div>
            <div class="modal-body body-font">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; flex-wrap: wrap; gap:10px;">
                    <button id="btn-new-profile" class="btn secondary-btn pill-btn" style="width:auto; padding: 4px 10px; font-size:0.85rem; color:var(--bright-red-orange);">New Profile</button>
                    <select id="profile-switcher" class="form-input pill-input" style="width:auto; padding: 4px 10px; font-size:0.85rem; margin:0; flex-grow:1;">
                        <option value="">Switch Profile...</option>
                    </select>
                </div>
                <input type="text" id="profile-name" class="form-input pill-input" placeholder="Enter your name" style="color:var(--primary-blue); font-weight:bold;">
                <p class="meta-text" style="margin-top:10px; margin-bottom:5px;">Select an Avatar:</p>
                <div class="avatar-grid" id="avatar-grid"></div>
                <hr class="divider">
                <button id="btn-save-profile" class="btn primary-btn pill-btn" style="margin-bottom: 10px;">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
