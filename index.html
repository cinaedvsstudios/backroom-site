<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backroom Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Barlow+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="age-gate" class="fullscreen-overlay">
        <div class="age-gate-content">
            <h1 id="ag-title" class="display-font">18+ ENTRY</h1>
            <p id="ag-text" class="body-font">Loading...</p>
            <p id="ag-disclaimer" class="body-font disclaimer">Loading...</p>
            <div class="ag-controls">
                <button id="btn-enter" class="btn primary-btn display-font">I AM 18+ - ENTER</button>
                <div class="translation-placeholder body-font">🌍 Translate [Placeholder]</div>
            </div>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <header>
            <h1 id="brand-title" class="display-font brand-text">BACKROOM</h1>
            <div class="header-controls">
                <button class="icon-btn" title="Shortlists">📑</button>
                <button class="icon-btn" title="Settings">⚙️</button>
                <div class="translation-placeholder small body-font">🌍</div>
            </div>
        </header>

        <main>
            <section id="search-filter-area">
                <input type="text" id="search-input" class="body-font" placeholder="Search venues, tags, cities..." autocomplete="off" autocorrect="off">
                <div class="filter-chips">
                    <button class="chip active">All</button>
                    <button class="chip">Open Now</button>
                    <button class="chip">Darkroom</button>
                    <button class="chip">Men Only</button>
                </div>
            </section>

            <section id="results-container">
                </section>
        </main>

        <footer id="site-footer" class="body-font">
            </footer>
    </div>

    <div id="venue-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal" class="btn-close">✕</button>
            <div class="modal-header">
                <h2 id="modal-title" class="display-font">VENUE NAME</h2>
                <div class="modal-actions">
                    <button id="modal-star" class="icon-btn">☆</button>
                    <button id="modal-shortlist" class="icon-btn">📑</button>
                    <button id="modal-share" class="icon-btn">🔗</button>
                </div>
            </div>
            
            <div class="modal-image-container">
                <div class="image-placeholder">VENUE IMAGE</div>
            </div>

            <div class="modal-body body-font">
                <div id="modal-status-bar" class="status-bar"></div>
                <p id="modal-address" class="meta-text"></p>
                <button id="btn-map" class="btn secondary-btn">🗺️ Show Directions</button>
                
                <div class="feature-chips" id="modal-features"></div>

                <div class="ratings-grid" id="modal-ratings">
                    </div>

                <div class="description-block">
                    <h3 class="display-font">ABOUT</h3>
                    <p id="modal-description"></p>
                </div>

                <div id="modal-events" class="events-block hidden">
                    <h3 class="display-font">UPCOMING EVENTS</h3>
                    <div id="events-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
