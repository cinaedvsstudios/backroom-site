<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backroom Admin Dashboard - v0.21</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Barlow+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-layout { display: flex; height: 100vh; overflow: hidden; background: var(--bg-color); color: #fff; }
        .admin-sidebar { width: 250px; background: var(--panel-dark); border-right: 1px solid var(--panel-mid); padding: 20px 0; display:flex; flex-direction:column; flex-shrink:0; }
        .admin-main { flex-grow: 1; padding: 30px; overflow-y: auto; overflow-x: hidden; display:flex; flex-direction:column; }
        
        .table-wrapper { overflow-x: auto; border: 1px solid var(--panel-mid); border-radius: var(--radius-card); background: var(--panel-standard); }
        table { width: 100%; border-collapse: collapse; font-family: 'Barlow Condensed', sans-serif; font-size:1.1rem; white-space: nowrap; }
        th, td { border-bottom: 1px solid var(--panel-mid); border-right: 1px solid var(--panel-mid); padding: 10px; text-align: left; }
        th { background: var(--panel-dark); color: var(--primary-blue); position: sticky; top: 0; z-index: 2; }
        tr:hover td { background: var(--panel-mid); }
        .row-mismatch td { background-color: rgba(213, 80, 54, 0.15) !important; border-color: var(--bright-red-orange); }

        .keypad { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:20px; max-width:250px; margin-left:auto; margin-right:auto; }
        .keypad .btn { font-size: 1.5rem; padding: 15px; }

        .summary-bar { background: var(--near-black); padding: 15px; border-radius: var(--radius-card); border: 1px solid var(--primary-blue); margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center; }
        .filter-header-input { width: 100%; padding: 4px 8px; font-size:0.9rem; margin-top:5px; background:var(--bg-color); color:#fff; border:1px solid var(--panel-mid); border-radius:var(--radius-pill); outline:none; }
        
        .active-filters-area { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
        .filter-pill { background: var(--bright-red-orange); color: #fff; padding: 4px 12px; border-radius: var(--radius-pill); font-size: 0.9rem; display:flex; align-items:center; gap:8px; }
        .filter-pill span { cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

    <div id="pin-gate" class="fullscreen-overlay">
        <div class="age-gate-content" style="max-width:350px;">
            <h1 class="display-font" style="color:var(--primary-blue); margin-bottom: 20px;">ADMIN LOGIN</h1>
            <input type="password" id="admin-pin" class="form-input pill-input" placeholder="Enter PIN (1234)" style="text-align:center; font-size:1.5rem; letter-spacing:5px;" readonly>
            
            <div class="keypad">
                <button class="btn secondary-btn pill-btn" onclick="addPin('1')">1</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('2')">2</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('3')">3</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('4')">4</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('5')">5</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('6')">6</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('7')">7</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('8')">8</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('9')">9</button>
                <button class="btn secondary-btn pill-btn" onclick="delPin()" style="background:var(--bright-red-orange);">DEL</button>
                <button class="btn secondary-btn pill-btn" onclick="addPin('0')">0</button>
                <button class="btn primary-btn pill-btn" id="btn-login">GO</button>
            </div>
            
            <p id="pin-error" class="meta-text hidden" style="color:var(--bright-red-orange); margin-top:15px; font-weight:bold;">Incorrect PIN</p>
        </div>
    </div>

    <div id="admin-shell" class="admin-layout hidden">
        <aside class="admin-sidebar">
            <h2 class="display-font" style="color:var(--primary-blue); padding: 0 20px 20px; text-align:center;">BR ADMIN</h2>
            <div class="sidebar-menu" style="flex-grow:1;">
                <div class="sidebar-item" onclick="switchView('venues')"><span class="icon">📍</span> <span class="sidebar-text">Venues</span></div>
                <div class="sidebar-item" onclick="switchView('events')"><span class="icon">📅</span> <span class="sidebar-text">Events</span></div>
                <hr class="divider">
                <div class="sidebar-item" onclick="alert('Profile avatar management placeholder')"><span class="icon">👤</span> <span class="sidebar-text">Profile Avatars</span></div>
                <div class="sidebar-item" onclick="alert('Global travel logic placeholder')"><span class="icon">🚄</span> <span class="sidebar-text">Travel</span></div>
                <hr class="divider">
                <div class="sidebar-item" onclick="alert('ChatGPT Scraper Hook Placeholder')"><span class="icon">🤖</span> <span class="sidebar-text">Scrape Info</span></div>
                <div class="sidebar-item" onclick="alert('ChatGPT Formatter Hook Placeholder')"><span class="icon">🤖</span> <span class="sidebar-text">Format Table</span></div>
            </div>
            <div style="padding: 20px;">
                <button id="btn-download-all" class="btn primary-btn pill-btn" style="font-size:0.9rem;">💾 Download ALL Files</button>
            </div>
        </aside>

        <main class="admin-main">
            
            <div class="summary-bar" id="data-summary-bar">
                <div>
                    <strong class="display-font" style="font-size:1.2rem; color:var(--primary-blue);" id="summary-title">VENUE DATA</strong><br>
                    <span id="summary-timestamp" class="meta-text">Showing Data From: N/A</span>
                </div>
                <div style="text-align:right;">
                    <span id="summary-mismatch" style="font-weight:bold; color:var(--bright-red-orange);">0 records do not match</span><br>
                    <button id="btn-highlight-changes" class="btn secondary-btn pill-btn" style="padding:4px 10px; font-size:0.8rem; margin-top:5px; width:auto;">Check Unsaved Changes</button>
                </div>
            </div>

            <div id="view-venues" style="display:flex; flex-direction:column; flex-grow:1;">
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <button id="btn-fetch-live" class="btn primary-btn pill-btn" style="width:auto;">☁️ Load Live Site Data</button>
                    <label class="btn secondary-btn pill-btn" style="width:auto; cursor:pointer;">
                        📂 Manual Upload JSON
                        <input type="file" id="file-upload" class="hidden" accept=".json">
                    </label>
                </div>

                <div id="active-filters" class="active-filters-area"></div>

                <div class="table-wrapper" id="admin-table-container">
                    <p style="padding:20px;">Click "Load Live Site Data" or upload a JSON file to begin.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
